<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prof d'Elsa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #9B4DB8;
      --primary-light: #F5EEF9;
      --primary-mid: #C98EDE;
      --primary-dark: #5E2172;
      --accent: #E8A0C2;
      --bg: #FAF7FC;
      --surface: #FFFFFF;
      --text: #1C1024;
      --text-muted: #8A7A96;
      --border: rgba(155,77,184,0.12);
      --radius: 18px;
      --radius-sm: 12px;
      --shadow: 0 4px 24px rgba(155,77,184,0.1);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky; top: 0; z-index: 10;
    }
    .avatar-header {
      width: 40px; height: 40px; border-radius: 50%;
      background: var(--primary-light);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; font-weight: 600; color: var(--primary);
      border: 1.5px solid var(--primary-mid);
      flex-shrink: 0;
    }
    .header-text h1 {
      font-family: 'Fraunces', serif;
      font-size: 19px; font-weight: 600; color: var(--text);
      letter-spacing: -0.3px;
    }
    .header-text p { font-size: 12px; color: var(--text-muted); margin-top: 1px; }

    .app-body {
      flex: 1; display: flex; flex-direction: column;
      max-width: 660px; width: 100%;
      margin: 0 auto; padding: 18px 16px; gap: 14px;
    }

    .api-banner {
      background: #FFFBEB; border: 1.5px solid #F59E0B;
      border-radius: var(--radius-sm); padding: 12px 16px;
      font-size: 13px; color: #92400E;
      display: flex; flex-direction: column; gap: 8px;
    }
    .api-banner strong { font-weight: 600; }
    .api-banner-row { display: flex; gap: 8px; align-items: center; }
    .api-banner input {
      flex: 1; font-family: 'DM Sans', sans-serif; font-size: 13px;
      border: 1px solid #F59E0B; border-radius: 8px; padding: 7px 10px;
      background: #fff; color: var(--text); outline: none;
    }
    .api-banner button {
      font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
      padding: 7px 14px; background: #F59E0B; color: #fff;
      border: none; border-radius: 8px; cursor: pointer;
    }
    .api-banner button:hover { background: #D97706; }

    .chat-window {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      display: flex; flex-direction: column;
      overflow: hidden; flex: 1; min-height: 500px;
    }
    .chat-topbar {
      padding: 12px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px;
    }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #22C55E;
      box-shadow: 0 0 0 3px rgba(34,197,94,0.15);
      flex-shrink: 0;
    }
    .chat-topbar .name {
      font-family: 'Fraunces', serif;
      font-size: 15px; font-weight: 600; color: var(--primary-dark);
    }
    .chat-topbar .sub { font-size: 12px; color: var(--text-muted); }

    .messages {
      flex: 1; overflow-y: auto; padding: 18px;
      display: flex; flex-direction: column; gap: 14px;
      scroll-behavior: smooth;
    }
    .msg { display: flex; flex-direction: column; max-width: 82%; }
    .msg-prof  { align-self: flex-start; }
    .msg-eleve { align-self: flex-end; }
    .msg-label {
      font-size: 11px; color: var(--text-muted); font-weight: 500;
      margin-bottom: 4px; padding: 0 6px; letter-spacing: 0.3px;
    }
    .msg-eleve .msg-label { text-align: right; }
    .msg-bubble {
      padding: 12px 16px; border-radius: 20px;
      font-size: 14px; line-height: 1.7; white-space: pre-wrap;
    }
    .msg-prof  .msg-bubble { background: var(--primary-light); color: var(--text); border-bottom-left-radius: 5px; }
    .msg-eleve .msg-bubble { background: var(--primary); color: #fff; border-bottom-right-radius: 5px; }

    .typing-bubble {
      display: flex; align-items: center; gap: 5px;
      padding: 12px 16px; background: var(--primary-light);
      border-radius: 20px; border-bottom-left-radius: 5px; width: fit-content;
    }
    .typing-bubble span {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--primary-mid);
      animation: blink 1.4s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.22s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.44s; }
    @keyframes blink { 0%,60%,100%{opacity:0.3;transform:scale(1)} 30%{opacity:1;transform:scale(1.25)} }

    .suggestions {
      display: flex; flex-wrap: wrap; gap: 7px;
      padding: 10px 16px 4px;
    }
    .sug-chip {
      font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
      padding: 6px 13px; border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg); color: var(--text-muted);
      cursor: pointer; transition: all 0.15s;
    }
    .sug-chip:hover { border-color: var(--primary); color: var(--primary); background: var(--primary-light); }

    .input-area {
      padding: 12px 16px 14px; border-top: 1px solid var(--border);
      display: flex; gap: 8px; align-items: flex-end;
    }
    .input-area textarea {
      flex: 1; font-family: 'DM Sans', sans-serif; font-size: 14px;
      border: 1px solid var(--border); border-radius: 14px;
      padding: 10px 14px; resize: none; min-height: 42px; max-height: 130px;
      outline: none; background: var(--bg); color: var(--text);
      transition: border-color 0.15s; line-height: 1.5;
    }
    .input-area textarea:focus { border-color: var(--primary); }
    .input-area textarea::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 42px; height: 42px; border-radius: 50%; border: none;
      background: var(--primary); cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; transition: all 0.15s;
    }
    .send-btn:hover:not(:disabled) { background: var(--primary-dark); transform: scale(1.05); }
    .send-btn:disabled { background: #D4C2DC; cursor: not-allowed; }
    .send-btn svg { width: 17px; height: 17px; fill: #fff; }

    @media (max-width: 480px) { .msg { max-width: 90%; } }
  </style>
</head>
<body>

<header class="app-header">
  <div class="avatar-header">E</div>
  <div class="header-text">
    <h1>Prof d'Elsa</h1>
    <p>3ème · Préparation brevet</p>
  </div>
</header>

<main class="app-body">

  <div class="api-banner" id="api-banner">
    <div><strong>🔑 Clé API requise</strong> — à configurer une seule fois.</div>
    <div class="api-banner-row">
      <input type="password" id="api-key-input" />
      <button onclick="saveApiKey()">Enregistrer</button>
    </div>
  </div>

  <div class="chat-window">
    <div class="chat-topbar">
      <div class="status-dot"></div>
      <div>
        <div class="name">Professeur d'Elsa</div>
        <div class="sub">3ème · Prêt à aider !</div>
      </div>
    </div>
    <div class="suggestions" id="suggestions"></div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <textarea id="input" placeholder="Pose ta question..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

</main>

<script>
const PROFILE = {
  name: 'Elsa',
  welcome: "Bonjour Elsa ! Je suis ton professeur particulier, ici pour t'aider à progresser et préparer ton brevet. Mon rôle n'est pas de te donner les réponses, mais de t'aider à construire ton raisonnement. Qu'est-ce qu'on travaille aujourd'hui ?",
  suggestions: [
    "J'ai une rédaction à faire ✍️",
    "Je bloque sur un exercice de maths",
    "Aide-moi à réviser le brevet",
    "Explique-moi un concept"
  ],
  system: `Tu es le professeur particulier d'Elsa, une jeune fille de 14 ans en fin de 3ème qui prépare son brevet des collèges.

RÈGLES ABSOLUES :
- Tu ne donnes JAMAIS la réponse directement. Tu guides Elsa avec des questions de méthode et des pistes de réflexion.
- Si Elsa te demande "donne-moi la réponse" ou veut que tu fasses le travail à sa place, tu refuses poliment et tu proposes une approche méthodologique.
- Tes réponses font 4 à 6 phrases maximum, sauf pour les explications de méthode.

TON ET STYLE :
- Bienveillant, stimulant, qui traite Elsa comme une élève intelligente et capable.
- Tu utilises un langage légèrement plus soutenu qu'avec un enfant, adapté à une adolescente.
- Tu encourages l'autonomie et la pensée critique.
- Tu valorises toujours l'effort avant de corriger.

MÉTHODE SOCRATIQUE :
1. Commence par demander à Elsa ce qu'elle a déjà compris ou essayé.
2. Utilise des questions ouvertes : "Qu'est-ce que cela te rappelle ?", "Quelle est la première étape selon toi ?", "Comment pourrais-tu vérifier ?"
3. Pour les rédactions : aide à structurer le plan (introduction / développement / conclusion) avant le contenu.
4. Pour les maths : guide la démarche de résolution étape par étape, sans faire les calculs.
5. Si Elsa est bloquée après 2-3 échanges, donne un indice méthodologique précis.

PROGRAMME 3ÈME / BREVET :
- Mathématiques : algèbre (équations, inéquations, fonctions), géométrie (théorème de Pythagore, Thalès, trigonométrie), statistiques, probabilités.
- Français : rédaction (récit, argumentation), analyse de texte, commentaire littéraire, dictée.
- Histoire-Géographie : programme complet 3ème, questions mondiales contemporaines.
- Physique-Chimie, SVT.
- Anglais (niveau B1-B2).
- Méthode brevet : gestion du temps, présentation des copies, raisonnement structuré.`
};

let history = [];
let isLoading = false;
let apiKey = localStorage.getItem('prof_api_key') || '';

function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  apiKey = val;
  localStorage.setItem('prof_api_key', val);
  document.getElementById('api-banner').style.display = 'none';
}

function init() {
  if (apiKey) document.getElementById('api-banner').style.display = 'none';
  history.push({ role: 'assistant', content: PROFILE.welcome });
  renderMessages();
  renderSuggestions();
}

function renderMessages() {
  const container = document.getElementById('messages');
  container.innerHTML = '';
  history.forEach(msg => {
    const wrapper = document.createElement('div');
    wrapper.className = 'msg ' + (msg.role === 'assistant' ? 'msg-prof' : 'msg-eleve');
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = msg.role === 'assistant' ? 'Professeur' : PROFILE.name;
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = msg.content;
    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    container.appendChild(wrapper);
  });
  container.scrollTop = container.scrollHeight;
}

function renderSuggestions() {
  const container = document.getElementById('suggestions');
  container.innerHTML = '';
  if (history.length <= 1) {
    PROFILE.suggestions.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'sug-chip';
      btn.textContent = s;
      btn.onclick = () => { document.getElementById('input').value = s; sendMessage(); };
      container.appendChild(btn);
    });
  }
}

function showTyping() {
  const container = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = 'msg msg-prof'; wrapper.id = 'typing';
  const label = document.createElement('div');
  label.className = 'msg-label'; label.textContent = 'Professeur';
  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  bubble.innerHTML = '<span></span><span></span><span></span>';
  wrapper.appendChild(label); wrapper.appendChild(bubble);
  container.appendChild(wrapper);
  container.scrollTop = container.scrollHeight;
}
function removeTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

async function sendMessage() {
  if (isLoading) return;
  if (!apiKey) {
    alert("Veuillez d'abord enregistrer votre clé API.");
    document.getElementById('api-banner').style.display = '';
    return;
  }
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  input.value = ''; autoResize(input);
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('suggestions').innerHTML = '';

  history.push({ role: 'user', content: text });
  renderMessages(); showTyping();

  const apiMessages = history.map(m => ({ role: m.role === 'assistant' ? 'assistant' : 'user', content: m.content }));

  try {
    const res = await fetch('https://claude-worker.julien-legrand67.workers.dev', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        "x-client-key": apiKey
      },
      body: JSON.stringify({ model: 'claude-sonnet-4-6', max_tokens: 1024, system: PROFILE.system, messages: apiMessages })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const reply = data.content?.[0]?.text || "Je n'ai pas pu répondre. Réessaie !";
    removeTyping();
    history.push({ role: 'assistant', content: reply });
    renderMessages();
  } catch(err) {
    removeTyping();
    const msg = err.message?.includes('401') ? 'Clé API invalide. Vérifiez votre clé.' : "Une erreur s'est produite. Vérifiez votre connexion.";
    history.push({ role: 'assistant', content: msg });
    renderMessages();
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  document.getElementById('input').focus();
}

function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } }
function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 130) + 'px'; }

init();
</script>
</body>
</html>
