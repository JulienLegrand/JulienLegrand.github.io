<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mon Professeur IA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Fraunces:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --robin-primary: #3B6FE8;
      --robin-light: #EEF3FD;
      --robin-dark: #1A3A8F;
      --elsa-primary: #C2509A;
      --elsa-light: #FCF0F7;
      --elsa-dark: #7A2260;
      --bg: #F7F6F2;
      --surface: #FFFFFF;
      --text: #1A1A1A;
      --text-muted: #7A7870;
      --border: rgba(0,0,0,0.08);
      --radius: 16px;
      --radius-sm: 10px;
      --shadow: 0 2px 16px rgba(0,0,0,0.07);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .app-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .app-logo {
      width: 38px;
      height: 38px;
      border-radius: var(--radius-sm);
      background: linear-gradient(135deg, var(--robin-primary), var(--elsa-primary));
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .app-header h1 {
      font-family: 'Fraunces', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }
    .app-header p {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* ── Layout ── */
    .app-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 680px;
      width: 100%;
      margin: 0 auto;
      padding: 20px 16px;
      gap: 16px;
    }

    /* ── Profile selector ── */
    .profile-selector {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    .profile-btn {
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .profile-btn:hover { transform: translateY(-1px); box-shadow: var(--shadow); }
    .profile-btn.active-robin { border-color: var(--robin-primary); background: var(--robin-light); }
    .profile-btn.active-elsa  { border-color: var(--elsa-primary);  background: var(--elsa-light); }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 800;
      flex-shrink: 0;
    }
    .avatar-robin { background: var(--robin-light); color: var(--robin-dark); border: 2px solid var(--robin-primary); }
    .avatar-elsa  { background: var(--elsa-light);  color: var(--elsa-dark);  border: 2px solid var(--elsa-primary); }
    .profile-text { text-align: left; }
    .profile-name { font-size: 15px; font-weight: 700; }
    .profile-meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .robin-color { color: var(--robin-primary); }
    .elsa-color  { color: var(--elsa-primary); }

    /* ── Chat window ── */
    .chat-window {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      flex: 1;
      min-height: 460px;
    }
    .chat-topbar {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #22C55E;
      box-shadow: 0 0 0 2px rgba(34,197,94,0.2);
      flex-shrink: 0;
    }
    .chat-topbar-info .name { font-size: 14px; font-weight: 700; }
    .chat-topbar-info .sub { font-size: 12px; color: var(--text-muted); }

    /* ── Messages ── */
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    .msg { display: flex; flex-direction: column; max-width: 80%; }
    .msg-prof  { align-self: flex-start; }
    .msg-eleve { align-self: flex-end; }
    .msg-label {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
      margin-bottom: 4px;
      padding: 0 4px;
    }
    .msg-eleve .msg-label { text-align: right; }
    .msg-bubble {
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
    }
    .msg-prof .msg-bubble {
      background: #F0EFEB;
      color: var(--text);
      border-bottom-left-radius: 5px;
    }
    .msg-eleve.robin  .msg-bubble { background: var(--robin-primary); color: #fff; border-bottom-right-radius: 5px; }
    .msg-eleve.elsa   .msg-bubble { background: var(--elsa-primary);  color: #fff; border-bottom-right-radius: 5px; }

    /* ── Typing indicator ── */
    .typing-bubble {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 12px 16px;
      background: #F0EFEB;
      border-radius: 18px;
      border-bottom-left-radius: 5px;
      width: fit-content;
    }
    .typing-bubble span {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--text-muted);
      animation: blink 1.3s infinite;
    }
    .typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
    .typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes blink { 0%,60%,100% { opacity: 0.3; transform: scale(1); } 30% { opacity: 1; transform: scale(1.2); } }

    /* ── Suggestions ── */
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 8px 16px 2px;
    }
    .sug-chip {
      font-family: 'Nunito', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1.5px solid var(--border);
      background: var(--bg);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .sug-chip:hover { color: var(--text); border-color: currentColor; }
    .sug-chip.robin:hover { border-color: var(--robin-primary); color: var(--robin-primary); }
    .sug-chip.elsa:hover  { border-color: var(--elsa-primary);  color: var(--elsa-primary); }

    /* ── Input area ── */
    .input-area {
      padding: 12px 16px 14px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: flex-end;
    }
    .input-area textarea {
      flex: 1;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 10px 14px;
      resize: none;
      min-height: 42px;
      max-height: 130px;
      outline: none;
      background: var(--bg);
      color: var(--text);
      transition: border-color 0.15s;
      line-height: 1.5;
    }
    .input-area textarea:focus { border-color: var(--active-color, var(--robin-primary)); }
    .input-area textarea::placeholder { color: var(--text-muted); }
    .send-btn {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: var(--active-color, var(--robin-primary));
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .send-btn:hover:not(:disabled) { filter: brightness(1.1); transform: scale(1.05); }
    .send-btn:disabled { background: #D0CEC8; cursor: not-allowed; }
    .send-btn svg { width: 18px; height: 18px; fill: #fff; }

    /* ── API key banner ── */
    .api-banner {
      background: #FFFBEB;
      border: 1.5px solid #F59E0B;
      border-radius: var(--radius-sm);
      padding: 12px 16px;
      font-size: 13px;
      color: #92400E;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .api-banner strong { font-weight: 700; }
    .api-banner-row { display: flex; gap: 8px; align-items: center; }
    .api-banner input {
      flex: 1;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      border: 1px solid #F59E0B;
      border-radius: 8px;
      padding: 7px 10px;
      background: #fff;
      color: var(--text);
      outline: none;
    }
    .api-banner button {
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 700;
      padding: 7px 14px;
      background: #F59E0B;
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .api-banner button:hover { background: #D97706; }

    /* ── Responsive ── */
    @media (max-width: 480px) {
      .profile-btn { padding: 10px; gap: 8px; }
      .avatar { width: 40px; height: 40px; font-size: 16px; }
      .profile-name { font-size: 14px; }
      .msg { max-width: 90%; }
    }
  </style>
</head>
<body>

<header class="app-header">
  <div class="app-logo">📚</div>
  <div>
    <h1>Mon Professeur IA</h1>
    <p>Aide aux devoirs personnalisée</p>
  </div>
</header>

<main class="app-body">

  <!-- Bannière clé API -->
  <div class="api-banner" id="api-banner">
    <div><strong>🔑 Clé API Anthropic requise</strong> — à configurer une seule fois.</div>
    <div class="api-banner-row">
      <input type="password" id="api-key-input" placeholder="sk-ant-api03-..." />
      <button onclick="saveApiKey()">Enregistrer</button>
    </div>
    <div style="font-size:11px; opacity:0.8;">
      Obtenez votre clé sur <a href="https://console.anthropic.com" target="_blank" style="color:inherit;">console.anthropic.com</a>
      — stockée uniquement dans localStorage de ce navigateur.
    </div>
  </div>

  <!-- Sélecteur de profil -->
  <div class="profile-selector">
    <button class="profile-btn active-robin" id="btn-robin" onclick="selectProfile('robin')">
      <div class="avatar avatar-robin">R</div>
      <div class="profile-text">
        <div class="profile-name robin-color">Robin</div>
        <div class="profile-meta">10 ans · CM2</div>
      </div>
    </button>
    <button class="profile-btn" id="btn-elsa" onclick="selectProfile('elsa')">
      <div class="avatar avatar-elsa">E</div>
      <div class="profile-text">
        <div class="profile-name elsa-color">Elsa</div>
        <div class="profile-meta">14 ans · 3ème</div>
      </div>
    </button>
  </div>

  <!-- Fenêtre de chat -->
  <div class="chat-window">
    <div class="chat-topbar">
      <div class="status-dot"></div>
      <div class="chat-topbar-info">
        <div class="name" id="topbar-name">Professeur de Robin</div>
        <div class="sub" id="topbar-sub">CM2 · Prêt à aider !</div>
      </div>
    </div>
    <div class="suggestions" id="suggestions"></div>
    <div class="messages" id="messages"></div>
    <div class="input-area">
      <textarea id="input" placeholder="Pose ta question..." rows="1"
        onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Envoyer">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>
  </div>

</main>

<script>
/* ── Configuration des profils ── */
const PROFILES = {
  robin: {
    name: 'Robin',
    age: 10,
    niveau: 'CM2',
    color: '#3B6FE8',
    topbarName: 'Professeur de Robin',
    topbarSub: 'CM2 · Prêt à aider !',
    welcome: "Salut Robin ! 👋 Je suis ton professeur particulier. Je suis là pour t'aider à comprendre tes leçons et tes exercices — mais je ne te donnerai pas les réponses toutes faites, on va réfléchir ensemble ! Sur quoi tu travailles aujourd'hui ?",
    suggestions: [
      "J'ai un problème de maths 🔢",
      "Je comprends pas ma leçon",
      "Les fractions c'est quoi ?",
      "Aide-moi en conjugaison"
    ],
    system: `Tu es le professeur particulier de Robin, un garçon de 10 ans en fin de CM2.

RÈGLES ABSOLUES :
- Tu ne donnes JAMAIS la réponse directement. Tu guides Robin avec des questions et des indices progressifs.
- Si Robin te demande "donne-moi la réponse" ou "dis-moi juste la réponse", tu refuses gentiment et tu proposes un indice à la place.
- Tu poses UNE seule question à la fois pour ne pas le surcharger.
- Tes réponses font 3 à 5 phrases courtes maximum.

TON ET STYLE :
- Langage simple, chaleureux, encourageant. Tu t'adresses à Robin avec "tu".
- Tu utilises des exemples concrets de sa vie quotidienne (jeux, sport, animaux, nourriture).
- Si Robin se trompe, tu commences toujours par valoriser l'effort ("Bonne réflexion !", "Tu es sur la bonne voie !") avant de corriger.
- Tu célèbres ses progrès avec enthousiasme.

MÉTHODE :
1. Si Robin pose une question, demande-lui d'abord ce qu'il comprend déjà du sujet.
2. Guide par des questions simples ("Selon toi, que se passe-t-il si...?").
3. Si Robin est bloqué après 2 échanges, donne un indice concret (pas la réponse).
4. Si Robin est bloqué après 4 échanges, tu peux décomposer le problème étape par étape avec lui.

PROGRAMME CM2 : Mathématiques (fractions, divisions posées, géométrie, mesures, problèmes), Français (conjugaison passé composé/imparfait/futur, accords, grammaire, orthographe, rédaction), Histoire-Géo, Sciences.`
  },

  elsa: {
    name: 'Elsa',
    age: 14,
    niveau: '3ème',
    color: '#C2509A',
    topbarName: 'Professeur d\'Elsa',
    topbarSub: '3ème · Préparation brevet',
    welcome: "Bonjour Elsa ! Je suis ton professeur particulier, ici pour t'aider à progresser et préparer ton brevet. Mon rôle n'est pas de te donner les réponses, mais de t'aider à construire ton raisonnement. Qu'est-ce qu'on travaille aujourd'hui ?",
    suggestions: [
      "J'ai une rédaction à faire ✍️",
      "Je bloque sur un exercice de maths",
      "Aide-moi à réviser le brevet",
      "Explique-moi un concept"
    ],
    system: `Tu es le professeur particulier d'Elsa, une jeune fille de 14 ans en fin de 3ème qui prépare son brevet des collèges.

RÈGLES ABSOLUES :
- Tu ne donnes JAMAIS la réponse directement. Tu guides Elsa avec des questions de méthode et des pistes de réflexion.
- Si Elsa te demande "donne-moi la réponse" ou veut que tu fasses le travail à sa place, tu refuses poliment et tu proposes une approche méthodologique.
- Tes réponses font 4 à 6 phrases maximum, sauf pour les explications de méthode.

TON ET STYLE :
- Bienveillant, stimulant, qui traite Elsa comme une élève intelligente et capable.
- Tu utilises un langage légèrement plus soutenu qu'avec un enfant, adapté à une adolescente.
- Tu encourages l'autonomie et la pensée critique.
- Tu valorises toujours l'effort avant de corriger.

MÉTHODE SOCRATIQUE :
1. Commence par demander à Elsa ce qu'elle a déjà compris ou essayé.
2. Utilise des questions ouvertes : "Qu'est-ce que cela te rappelle ?", "Quelle est la première étape selon toi ?", "Comment pourrais-tu vérifier ?"
3. Pour les rédactions : aide à structurer le plan (introduction / développement / conclusion) avant le contenu.
4. Pour les maths : guide la démarche de résolution étape par étape, sans faire les calculs.
5. Si Elsa est bloquée après 2-3 échanges, donne un indice méthodologique précis.

PROGRAMME 3ÈME / BREVET :
- Mathématiques : algèbre (équations, inéquations, fonctions), géométrie (théorème de Pythagore, Thalès, trigonométrie), statistiques, probabilités.
- Français : rédaction (récit, argumentation), analyse de texte, commentaire littéraire, dictée.
- Histoire-Géographie : programme complet 3ème, questions mondiales contemporaines.
- Physique-Chimie, SVT.
- Anglais (niveau B1-B2).
- Méthode brevet : gestion du temps, présentation des copies, raisonnement structuré.`
  }
};

/* ── État de l'app ── */
let currentProfile = 'robin';
let histories = { robin: [], elsa: [] };
let isLoading = false;
let apiKey = localStorage.getItem('anthropic_api_key') || '';

/* ── Clé API ── */
function saveApiKey() {
  const val = document.getElementById('api-key-input').value.trim();
  if (!val.startsWith('sk-')) {
    alert('La clé API doit commencer par "sk-"');
    return;
  }
  apiKey = val;
  localStorage.setItem('anthropic_api_key', val);
  document.getElementById('api-banner').style.display = 'none';
}

function initApiKey() {
  if (apiKey) {
    document.getElementById('api-banner').style.display = 'none';
  }
}

/* ── Profil ── */
function selectProfile(p) {
  currentProfile = p;
  const prof = PROFILES[p];

  document.getElementById('btn-robin').className = 'profile-btn' + (p === 'robin' ? ' active-robin' : '');
  document.getElementById('btn-elsa').className  = 'profile-btn' + (p === 'elsa'  ? ' active-elsa'  : '');
  document.getElementById('topbar-name').textContent = prof.topbarName;
  document.getElementById('topbar-sub').textContent  = prof.topbarSub;
  document.documentElement.style.setProperty('--active-color', prof.color);

  if (histories[p].length === 0) {
    histories[p].push({ role: 'assistant', content: prof.welcome });
  }

  renderMessages();
  renderSuggestions();
}

/* ── Rendu messages ── */
function renderMessages() {
  const p = currentProfile;
  const prof = PROFILES[p];
  const container = document.getElementById('messages');
  container.innerHTML = '';

  histories[p].forEach(msg => {
    const wrapper = document.createElement('div');
    wrapper.className = 'msg ' + (msg.role === 'assistant' ? 'msg-prof' : 'msg-eleve ' + p);

    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = msg.role === 'assistant' ? 'Professeur' : prof.name;

    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.textContent = msg.content;

    wrapper.appendChild(label);
    wrapper.appendChild(bubble);
    container.appendChild(wrapper);
  });

  container.scrollTop = container.scrollHeight;
}

/* ── Suggestions ── */
function renderSuggestions() {
  const p = currentProfile;
  const container = document.getElementById('suggestions');
  container.innerHTML = '';

  if (histories[p].length <= 1) {
    PROFILES[p].suggestions.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'sug-chip ' + p;
      btn.textContent = s;
      btn.onclick = () => {
        document.getElementById('input').value = s;
        sendMessage();
      };
      container.appendChild(btn);
    });
  }
}

/* ── Indicateur de frappe ── */
function showTyping() {
  const container = document.getElementById('messages');
  const wrapper = document.createElement('div');
  wrapper.className = 'msg msg-prof';
  wrapper.id = 'typing';

  const label = document.createElement('div');
  label.className = 'msg-label';
  label.textContent = 'Professeur';

  const bubble = document.createElement('div');
  bubble.className = 'typing-bubble';
  bubble.innerHTML = '<span></span><span></span><span></span>';

  wrapper.appendChild(label);
  wrapper.appendChild(bubble);
  container.appendChild(wrapper);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const t = document.getElementById('typing');
  if (t) t.remove();
}

/* ── Envoi de message ── */
async function sendMessage() {
  if (isLoading) return;
  if (!apiKey) {
    alert('Veuillez d\'abord enregistrer votre clé API Anthropic.');
    document.getElementById('api-banner').style.display = '';
    return;
  }

  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  const p = currentProfile;
  input.value = '';
  autoResize(input);
  isLoading = true;
  document.getElementById('send-btn').disabled = true;
  document.getElementById('suggestions').innerHTML = '';

  histories[p].push({ role: 'user', content: text });
  renderMessages();
  showTyping();

  /* Construit les messages pour l'API (format user/assistant uniquement) */
  const apiMessages = histories[p].map(m => ({
    role: m.role === 'assistant' ? 'assistant' : 'user',
    content: m.content
  }));

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-calls': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1024,
        system: PROFILES[p].system,
        messages: apiMessages
      })
    });

    const data = await res.json();

    if (data.error) {
      throw new Error(data.error.message || 'Erreur API');
    }

    const reply = data.content?.[0]?.text || 'Je n\'ai pas pu répondre. Réessaie !';
    removeTyping();
    histories[p].push({ role: 'assistant', content: reply });
    renderMessages();

  } catch (err) {
    removeTyping();
    const errMsg = err.message?.includes('401')
      ? 'Clé API invalide. Vérifiez votre clé dans la bannière en haut.'
      : 'Une erreur s\'est produite. Vérifiez votre connexion et réessayez.';
    histories[p].push({ role: 'assistant', content: errMsg });
    renderMessages();
    console.error('Erreur API:', err);
  }

  isLoading = false;
  document.getElementById('send-btn').disabled = false;
  input.focus();
}

/* ── Utilitaires ── */
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
